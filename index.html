<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Delivery Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🍔 QuickBite Food Delivery</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#menu">Menu</a>
        <a href="#order">Order</a>
    </nav>
</header>

<section class="hero">
    <h1>Delicious Food Delivered To You</h1>
    <p>Order your favorite meals anytime</p>
</section>

<section id="menu">
    <h2>Our Menu</h2>

    <div class="menu-container">

        <div class="food-card">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
            <h3>Burger</h3>
            <p>₹120</p>
            <button onclick="addToCart(120)">Add to Cart</button>
        </div>

        <div class="food-card">
            <img src="https://images.unsplash.com/photo-1548365328-5b849c6c6d1a">
            <h3>Pizza</h3>
            <p>₹250</p>
            <button onclick="addToCart(250)">Add to Cart</button>
        </div>

        <div class="food-card">
            <img src="https://images.unsplash.com/photo-1604908176997-4310fdb1b3b0">
            <h3>Biryani</h3>
            <p>₹180</p>
            <button onclick="addToCart(180)">Add to Cart</button>
        </div>

        <div class="food-card">
            <img src="https://images.unsplash.com/photo-1553621042-f6e147245754">
            <h3>Pasta</h3>
            <p>₹150</p>
            <button onclick="addToCart(150)">Add to Cart</button>
        </div>

    </div>
</section>

<section id="order">
    <h2>Your Cart</h2>
    <p class="cart">Total Amount: ₹ <span id="total">0</span></p>

    <button onclick="placeOrder()">Place Order</button>
    <p id="message"></p>
</section>

<footer>
    <p>© 2026 QuickBite</p>
</footer>

<script src="script.js"></script>
</body>
</html>
